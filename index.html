<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8">
  <title>Tuff Spare Parts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f5f5f5;
      margin: 0;
      padding: 0;
    }

    h1 {
      margin-top: 20px;
    }

    #avatar {
      margin: 20px auto;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #avatar img {
      border-radius: 50%;
      width: 120px;
      height: 120px;
      object-fit: cover;
    }

    #avatarMessage {
      font-weight: bold;
      margin-top: 10px;
      color: #333;
    }

    form {
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 400px;
      margin: auto;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      padding: 15px;
      background: #25D366;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
      width: 100%;
    }

    button:hover {
      background: #1ebe5d;
    }

    @media (max-width: 500px) {
      input, select, textarea, button {
        font-size: 14px;
        padding: 10px;
      }
    }
  </style>
</head>
<body>

  <h1>Tuff Spare Parts</h1>

  <!-- Avatar -->
  <div id="avatar">
    <img src="https://i.imgur.com/4AiXzf8.png" alt="Tuff Helper">
    <p id="avatarMessage">Karibu kwenye Tuff Spare Parts! 👋</p>
  </div>

  <!-- Fomu ya order -->
  <form id="orderForm">
    <input type="text" id="name" placeholder="Jina">
    <input type="text" id="phone" placeholder="Simu">
    <select id="brand">
      <option>Land Rover</option>
      <option>Audi</option>
      <option>Volkswagen</option>
      <option>Mercedes Benz</option>
      <option>BMW</option>
      <option>Mini Cooper</option>
    </select>
    <input type="text" id="model" placeholder="Model">
    <input type="text" id="chassis" placeholder="Chassis Number">
    <input type="text" id="part" placeholder="Spare Part">
    <textarea id="notes" placeholder="Maelezo"></textarea>
    <button type="button" onclick="sendOrder()">Tuma Order WhatsApp</button>
  </form>

  <script>
    // WhatsApp order function
    function sendOrder() {
      let name = document.getElementById("name").value;
      let phone = document.getElementById("phone").value;
      let brand = document.getElementById("brand").value;
      let model = document.getElementById("model").value;
      let chassis = document.getElementById("chassis").value;
      let part = document.getElementById("part").value;
      let notes = document.getElementById("notes").value;

      if (!name || !phone) {
        alert("Tafadhali jaza jina na namba ya simu.");
        return;
      }

      let message = "ORDER TUFF SPARE PARTS %0A"
        + "Jina: " + name + "%0A"
        + "Simu: " + phone + "%0A"
        + "Brand: " + brand + "%0A"
        + "Model: " + model + "%0A"
        + "Chassis: " + chassis + "%0A"
        + "Spare: " + part + "%0A"
        + "Maelezo: " + notes;

      window.open("https://wa.me/255715555005?text=" + message);
    }

    // Avatar talking text-style
    const avatarMsg = document.getElementById("avatarMessage");
    document.getElementById("name").addEventListener("focus", () => avatarMsg.innerText="Tafadhali weka jina lako.");
    document.getElementById("phone").addEventListener("focus", () => avatarMsg.innerText="Sasa weka namba yako ya simu.");
    document.getElementById("brand").addEventListener("focus", () => avatarMsg.innerText="Chagua brand ya gari lako.");
    document.getElementById("model").addEventListener("focus", () => avatarMsg.innerText="Andika model ya gari.");
    document.getElementById("chassis").addEventListener("focus", () => avatarMsg.innerText="Andika Chassis Number.");
    document.getElementById("part").addEventListener("focus", () => avatarMsg.innerText="Andika jina la spare part unalotaka.");
    document.getElementById("notes").addEventListener("focus", () => avatarMsg.innerText="Andika maelezo yoyote muhimu.");
  </script>

</body>
</html>
