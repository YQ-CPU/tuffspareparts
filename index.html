<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8">
  <title>Tuff Spare Parts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="favicon.png" />
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }
    
    header img {
      width: 100%; 
      height: auto;
      object-fit: cover;
    }

    h1 {
      color: #2c3e50;
      margin: 20px 0;
      font-size: 2.2em;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
    }

    #avatar {
  position: fixed;
  top: 30px;
  left: 20px;

  display: flex;
  flex-direction: row; /* muhimu: picha kushoto, text kulia */
  align-items: center;
  gap: 10px;

  z-index: 9999;
}

    #avatar img {
  border-radius: 50%;
  width: 60px;
  height: 60px;
  object-fit: cover;
  border: 3px solid #25D366;
  box-shadow: 0 6px 20px rgba(37, 211, 102, 0.4);
  transition: all 0.3s ease;
      animation: float 3s ease-in-out infinite;
    }

    #avatar img:hover {
      transform: scale(1.05);
      box-shadow: 0 12px 35px rgba(37, 211, 102, 0.5);
    }

    #avatarMessage {
  font-weight: 600;
  color: #2c3e50;
  font-size: 0.9em;

  padding: 10px 15px;
  background: rgba(255,255,255,0.95);

  border-radius: 15px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  
  position: relative;
  
  max-width: 200px;
  text-align: left;
}

#avatarMessage::after {
  content: "";
  position: absolute;
  left: -6px;
  top: 15px;
  border-width: 6px;
  border-style: solid;
  border-color: transparent rgba(255,255,255,0.95) transparent transparent;
}  

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }

    @keyframes messagePop {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes talk {
      0%, 100% { transform: scaleY(1); }
      50% { transform: scaleY(0.95); }
    }

    .avatar-talking img {
      animation: talk 0.5s ease-in-out infinite;
    }

    form {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 80%;
      max-width: 400px;
      margin: auto;
      margin-bottom: 40px;
      background: rgba(255,255,255,0.95);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    }

    input, select, textarea {
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      border-radius: 12px;
      border: 2px solid #e1e8ed;
      font-size: 16px;
      box-sizing: border-box;
      transition: all 0.3s ease;
      background: #fff;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #25D366;
      box-shadow: 0 0 0 3px rgba(37, 211, 102, 0.1);
      transform: translateY(-2px);
    }

    button {
      padding: 18px;
      background: linear-gradient(45deg, #25D366, #20b358);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 15px;
      width: 100%;
      transition: all 0.3s ease;
      box-shadow: 0 6px 20px rgba(37, 211, 102, 0.3);
    }

    button:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(37, 211, 102, 0.4);
    }

    @media (max-width: 500px) {
      #avatar img {
        width: 120px;
        height: 120px;
      }
      input, select, textarea, button {
        font-size: 16px;
        padding: 14px;
      }
    }
  </style>
</head>
<body>
  <header>
    <img src="tuff-logo.png" alt="Tuff Spare Parts">
  </header>
  <h1>🏆 High Quality Spare Parts</h1>

  <!-- Avatar ya Professional -->
  <div id="avatar">
    <img id="avatarImg" src="avatar.png""https://i.imgur.com/4AiXzf8.png" alt="Tuff Helper">
    <p id="avatarMessage">👋 Habari! Karibu Unahitaji nini leo</p>
  </div>

  <!-- Fomu ya Order -->
  <form id="orderForm">
    <input type="text" id="name" placeholder="📝 Jina lako kamili">
    <input type="tel" id="phone" placeholder="📱 Namba yako ya simu">
    <select id="brand">
      <option value="">Chagua Brand</option>
      <option>Land Rover</option>
      <option>Audi</option>
      <option>Volkswagen</option>
      <option>Mercedes Benz</option>
      <option>BMW</option>
      <option>Mini Cooper</option>
    </select>
    <input type="text" id="model" placeholder="🚗 Model ya gari">
    <input type="text" id="chassis" placeholder="🔢 Chassis Number">
    <input type="text" id="part" placeholder="🔧 Spare Part unazotafuta">
    <textarea id="notes" placeholder="📄 Maelezo ya ziada (optional)" rows="3"></textarea>
    <button type="button" onclick="sendOrder()">🚀 Tuma Order WhatsApp Sasa</button>
  </form>

  <script>
    // Avatar professional interactions
    const avatarImg = document.getElementById("avatarImg");
    const avatarMsg = document.getElementById("avatarMessage");
    
    const messages = {
      name: "😊 Tafadhali weka jina lako kamili",
      phone: "📱 Sasa weka namba yako ya simu (255...)",
      brand: "🚗 Chagua brand ya gari lako kutoka list",
      model: "📝 Andika model kamili ya gari lako",
      chassis: "🔢 Chassis number inasaidia kupata spare sahihi",
      part: "🔧 Andika jina la spare part unazohitaji",
      notes: "💬 Ongeza maelezo yoyote muhimu hapa"
    };

    // Add event listeners for all inputs
    Object.keys(messages).forEach(id => {
      const element = document.getElementById(id);
      if (element) {
        element.addEventListener("focus", () => {
          avatarMsg.innerText = messages[id];
          avatarImg.classList.add("avatar-talking");
        });
        
        element.addEventListener("blur", () => {
          avatarImg.classList.remove("avatar-talking");
          avatarMsg.innerText = "Karibu Sana Tuff Spare Parts! 👋 Nifahamishie unahitaji nini";
        });
      }
    });

    // WhatsApp order function (same as before but improved)
    function sendOrder() {
      let name = document.getElementById("name").value.trim();
      let phone = document.getElementById("phone").value.trim();
      
      if (!name || !phone) {
        alert("❌ Tafadhali jaza jina na namba ya simu kwanza!");
        return;
      }
      
      if (!phone.startsWith('255') && phone.length > 10) {
        phone = '255' + phone.slice(-9);
      }

      let brand = document.getElementById("brand").value;
      let model = document.getElementById("model").value;
      let chassis = document.getElementById("chassis").value;
      let part = document.getElementById("part").value;
      let notes = document.getElementById("notes").value;

      let message = "🔧 *ORDER TUFF SPARE PARTS* 🔧%0A%0A" +
        "👤 *Jina:* " + name + "%0A" +
        "📱 *Simu:* " + phone + "%0A" +
        "🚗 *Brand:* " + brand + "%0A" +
        "📝 *Model:* " + model + "%0A" +
        "🔢 *Chassis:* " + chassis + "%0A" +
        "🔧 *Spare Part:* " + part + "%0A" +
        "💬 *Maelezo:* " + notes + "%0A%0A" +
        "*Asante kwa kuchagua Tuff Spare Parts!* 💪";

      window.open("https://wa.me/255715555005?text=" + encodeURIComponent(message), '_blank');
    }
  </script>
</body>
</html>
