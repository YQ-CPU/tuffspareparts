<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8">
  <title>Tuff Spare Parts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      margin: 0;
      padding-top: 180px;
    }

    header img {
      width: 100%;
      border-radius: 15%;
    }

    h1 {
      color: #2c3e50;
    }

    #avatar {
      position: fixed;
      top: 20px;
      left: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 9999;
      background: #66ff557b;
      border-radius: 30px;
      padding: 20px;
    }

    #avatar img {
      border-radius: 50%;
      width: 80px;
      height: 80px;
      border: 3px solid #25D366;
    }

    #avatarMessage {
      background: white;
      padding: 10px;
      border-radius: 10px;
      max-width: 180px;
    }

    .avatar-talking img {
      animation: talk 0.5s infinite;
    }

    @keyframes talk {
      0%,100%{transform:scaleY(1);}
      50%{transform:scaleY(0.9);}
    }

    form {
      width: 80%;
      max-width: 400px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 20px;
    }

    input, select, textarea {
      width: 90%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: 1px solid #ccc;
    }
    
    select#brand{
      width: 100%;
    }

    button {
      padding: 15px;
      background: #25D366;
      color: white;
      border: none;
      border-radius: 10px;
      width: 100%;
      font-size: 16px;
    }
  </style>
</head>
<body>

<header>
  <img src="img/tuff logo.jpg">
</header>

<h1>🏆 High Quality Spare Parts</h1>

<!-- AVATAR -->
<div id="avatar">
  <img id="avatarImg" src="img/avatar.png">
  <p id="avatarMessage">👋Habari! Karibu Tuff Spare Parts. Niko hapa kukusaidia.</p>
</div>

<!-- FORM -->
<form>
  <input type="text" id="name" placeholder="Jina">
  <input type="tel" id="phone" placeholder="Simu">
  <select id="brand">
    <option value="">Brand</option>
    <option>AUDI</option>
    <option>BMW</option>
    <option>LAND ROVER</option>
    <option>MERCEDES BENZ</option>
    <option>MINI COOPER</option>
    <option>RANGE ROVER</option>
    <option>VOLKSWAGEN</option>
    
  </select>
  <input type="text" id="chesses" placeholder="Chesses">
  <input type="text" id="model" placeholder="Model">
  <input type="text" id="part" placeholder="Spare Part">
  <button type="button" onclick="sendOrder()">Tuma WhatsApp</button>
</form>

<script>
const avatarImg = document.getElementById("avatarImg");
const avatarMsg = document.getElementById("avatarMessage");

// 🔊 SPEAK FUNCTION
function speak(text) {
  const speech = new SpeechSynthesisUtterance(text);
  speech.lang = "sw-TZ";
  speech.rate = 1;

  avatarImg.classList.add("avatar-talking");

  speech.onend = () => {
    avatarImg.classList.remove("avatar-talking");
  };

  window.speechSynthesis.speak(speech);
}

// 🎤 MESSAGES
const messages = {
  name: "Tafadhali weka jina lako kamili",
  phone: "Weka namba yako ya simu",
  brand: "Chagua brand ya gari lako",
  chesses:"Weka chesses namba ya gari lako itasaidia kupata spare unazohitaji.",
  model: "Andika modeli ya gari lako.",
  part: "Ni spare part gani unazohitaji?"
};

// ✅ FIX: prevent null errors
Object.keys(messages).forEach(id => {
  const el = document.getElementById(id);

  if (el) {
    el.addEventListener("focus", () => {
      const msg = messages[id];
      avatarMsg.innerText = msg;
      speak(msg);
    });
  }
});

// ✅ FIX: mobile autoplay restriction
window.addEventListener("click", () => {
  const welcome = "👋Habari! Karibu Taff Spea Parts. Mimi ni EI AI Niko hapa kukusaidia.";
  avatarMsg.innerText = welcome;
  speak(welcome);
}, { once: true });

// 📲 WHATSAPP
function sendOrder() {
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let brand = document.getElementById("brand").value;
  let model = document.getElementById("model").value;
  let part = document.getElementById("part").value;

  let msg = `REQUISTED ORDER:\nName:${name}\nPhone:${phone}\nBrand:${brand}\nModel:${model}\nPart:${part}`;

  // ✅ FIX: encoding
  window.open("https://wa.me/255715555005?text=" + encodeURIComponent(msg));
}
</script>

</body>
</html>
